<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Democracy News Live mark: 3×3 dot grid, one red. Vector = crisp at every size (16px tab → retina).
       Dots pushed near the edges (r=10, centers 11/32/53) so the mark reads large in a browser tab. -->
  <g fill="#2556A6">
    <circle cx="11" cy="11" r="10"/>
    <circle cx="32" cy="11" r="10"/>
    <circle cx="11" cy="32" r="10"/>
    <circle cx="32" cy="32" r="10"/>
    <circle cx="53" cy="32" r="10"/>
    <circle cx="11" cy="53" r="10"/>
    <circle cx="32" cy="53" r="10"/>
    <circle cx="53" cy="53" r="10"/>
  </g>
  <circle cx="53" cy="11" r="10" fill="#E11B2E"/>
</svg>
